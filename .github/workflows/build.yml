name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Завантажити код репозиторію
        uses: actions/checkout@v4

      - name: Встановити Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановити системні залежності
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
              autoconf libtool pkg-config zlib1g-dev libncurses-dev \
              libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev \
              build-essential

      - name: Встановити buildozer і cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Зібрати APK
        run: |
          yes | buildozer android debug

      - name: Завантажити готовий APK як артефакт
        uses: actions/upload-artifact@v4
        with:
          name: lens-tracker-apk
          path: bin/*.apk
